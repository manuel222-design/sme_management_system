{% extends "base.html" %}

{% block content %}
<h2>Expenses</h2>
<a href="/add-expense" class="btn btn-primary mb-3"><i class="bi bi-plus-lg"></i> Add Expense</a>

<table class="table table-striped table-hover table-bordered shadow-sm">
    <thead class="table-dark">
        <tr>
            <th>Description</th>
            <th>Amount</th>
        </tr>
    </thead>
    <tbody>
        {% for expense in expenses %}
        <tr>
            <td>{{ expense.description }}</td>
            <td>Ksh {{ "%.2f"|format(expense.amount) }}</td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
