{% extends "base.html" %}
{% block content %}

<div class="container vh-100 d-flex justify-content-center align-items-center">
    <div class="col-md-5">

        <div class="card shadow-lg border-0 rounded-4 p-4">

            <h3 class="text-center mb-4 fw-bold">Welcome Back 👋</h3>

            <form method="POST">

                <!-- Username -->
                <div class="mb-3">
                    <label class="form-label">Username</label>
                    <input type="text"
                           name="username"
                           class="form-control rounded-3"
                           placeholder="Enter your username"
                           required>
                </div>

                <!-- Password -->
                <div class="mb-3 position-relative">
                    <label>Password</label>
                    <input type="password" name="password" class="form-control" placeholder="Enter your password" required>
                    
                    <div class="text-end mt-1">
                        <a href="/forgot-password" class="text-muted small">
                            Forgot Password?
                        </a>
                    </div>

                    <!-- Eye icon -->
                    <span onclick="togglePassword()"
                          style="position:absolute; right:15px; top:38px; cursor:pointer;">
                        👁
                    </span>
                </div>

                <!-- Login Button -->
                <button type="submit"
                        class="btn btn-success w-100 rounded-3 fw-bold">
                    Login
                </button>

            </form>

            <p class="text-center mt-3 mb-0">
                Don't have an account?
                <a href="/register" class="fw-bold text-decoration-none">
                    Register
                </a>
            </p>

        </div>

    </div>
</div>

<!-- Password Toggle Script -->
<script>
function togglePassword() {
    const password = document.getElementById("password");
    if (password.type === "password") {
        password.type = "text";
    } else {
        password.type = "password";
    }
}
</script>

{% endblock %}
