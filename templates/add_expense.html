{% extends "base.html" %}

{% block content %}
<h2>Add Expense</h2>

<form method="POST" class="shadow p-4 rounded bg-light">

    <div class="mb-3">
        <label>Description</label>
        <input type="text" name="description" class="form-control" required>
    </div>

    <div class="mb-3">
        <label>Amount</label>
        <input type="number" step="0.01" name="amount" class="form-control" required>
    </div>

    <button type="submit" class="btn btn-success btn-lg"><i class="bi bi-check-lg"></i> Save Expense</button>
</form>
{% endblock %}
